version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://apexgrid:apexgrid@db:5432/apexgrid
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=super-secret-key-change-in-prod
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=apexgrid
      - POSTGRES_PASSWORD=apexgrid
      - POSTGRES_DB=apexgrid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
